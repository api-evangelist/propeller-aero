  humanURL: https://propelleraero.readme.io/reference
  baseURL: https://api.propelleraero.com/v1
  properties:
  - url: https://propelleraero.readme.io/reference
    type: APIReference
  - url: openapi/propeller-aero-openapi.yml
    type: OpenAPI
  description: List and retrieve DirtMate position-monitoring configurations
    (devices configured as position monitors) and their recorded epochs - the
    individual position measurements captured over time - for tracking ground
    movement and asset positions between drone surveys.
