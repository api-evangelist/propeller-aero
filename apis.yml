aid: propeller-aero
url: https://raw.githubusercontent.com/api-evangelist/propeller-aero/refs/heads/main/apis.yml
name: Propeller Aero
kind: company
description: Propeller Aero is a drone survey and earthworks analytics platform for
  construction, mining, aggregates, and waste sites. Teams fly a drone, process
  imagery with Propeller's AeroPoints ground control and photogrammetry pipeline,
  and get accurate 3D site surveys, terrain models, volumes, and progress tracking
  in the Propeller Platform. The Propeller Public API is a paid, premium feature
  (available on higher tiers such as Scale) that gives programmatic, read-oriented
  access to organizations, sites, workspaces, surveys, downloadable survey files
  (orthophotos, terrain, point clouds), user-defined shapes and their calculated
  widgets (volumes, distances, areas), and DirtMate position-monitoring data. It is
  a REST API over HTTPS authenticated with a Bearer access token or via OpenID
  Connect.
