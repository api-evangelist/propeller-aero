specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Propeller Aero
providerId: propeller-aero
created: '2026-07-04'
modified: '2026-07-04'
reconciled: false
tags:
- Drone Survey
- Geospatial
- Earthworks
- Construction
- Mining
- Plans
description: >-
  Propeller Aero is sold as annual platform subscriptions priced per site, plus
  AeroPoints ground-control hardware and optional data services. Pricing is
  quote-based (contact sales) and not published as a public price list;
  third-party reviews indicate roughly USD 5,000-10,000 per site per year in
  platform subscription plus AeroPoint hardware. The Propeller Public API is a
  paid, premium feature bundled into higher tiers - notably the Scale plan aimed
  at larger organizations - rather than a metered, pay-as-you-go API product.
  There is no per-call API price; API access is a plan entitlement.
notes: >-
  Figures are indicative from third-party review sites, not an official price
  list. Confirm current per-site pricing, which tier includes Public API access,
  and hardware costs directly with Propeller sales during reconciliation.
sources:
- https://www.propelleraero.com/platform/scale/
- https://help.propelleraero.com/hc/en-us/articles/19383843944599-Using-Propeller-API
- https://help.propelleraero.com/hc/en-us/articles/19383553319703-Annual-AeroPoints-Processing-Subscription
- https://www.capterra.com/p/179319/Propeller-Platform/
plans:
- id: propeller-aero-platform
  name: Platform (per-site subscription)
  type: subscription
  description: >-
    Annual per-site subscription to the Propeller Platform for drone-survey
    processing, 3D site visualization, measurements, and progress tracking.
    Standard tiers do not include Public API access.
  entries:
  - label: Platform per site / year
    name: platform_site_year
    type: recurring
    metric: sites
    limit: -1
    timeFrame: year
    geo: global
    unit: 1
    price: quote-based (indicatively ~$5,000-$10,000 per site/year)
    userMultiplied: false
  elements:
  - name: Drone Survey Processing
  - name: 3D Site Visualization
  - name: Measurements & Volumes
  - name: Progress Tracking
- id: propeller-aero-scale
  name: Scale
  type: subscription
  description: >-
    Higher tier for larger organizations with many teams, adding security,
    scalability, and integrated workflows - including custom Public API
    integrations to automate exports and connect GIS tools.
  entries:
  - label: Scale platform / year
    name: scale_year
    type: recurring
    metric: contract
    limit: -1
    timeFrame: year
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
  elements:
  - name: Public API Access
  - name: Custom Integrations
  - name: Advanced Security
  - name: Multi-team Management
- id: propeller-aero-hardware
  name: AeroPoints Hardware & Processing
  type: purchase
  description: >-
    Smart ground-control points (AeroPoints) purchased per site, with an annual
    AeroPoints processing subscription for standalone hardware users.
  entries:
  - label: AeroPoint unit
    name: aeropoint_unit
    type: one_time
    metric: units
    limit: -1
    timeFrame: once
    geo: global
    unit: 1
    price: from ~$1,000 per unit (typically 5-7 units per site)
    userMultiplied: false
  - label: AeroPoints Processing Subscription
    name: aeropoints_processing
    type: recurring
    metric: groups
    limit: -1
    timeFrame: year
    geo: global
    unit: 1
    price: $999 per AeroPoint group / year (standalone)
    userMultiplied: false
  elements:
  - name: AeroPoints Ground Control
  - name: Photogrammetry Processing
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
