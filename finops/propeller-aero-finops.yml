description: >-
  FinOps view of Propeller Aero spend. Propeller bills as annual, quote-based
  platform subscriptions priced per site, plus AeroPoints ground-control
  hardware (per unit) and an optional annual AeroPoints processing subscription.
  The Public API is not separately metered - it is an entitlement of higher
  tiers (such as Scale) - so API usage carries no incremental per-call charge.
  Cost is driven primarily by the number of sites under subscription and the
  hardware fleet, making per-site and per-team allocation the main levers.
notes: >-
  Propeller does not publish a public price list; per-site and hardware figures
  are indicative from third-party sources. Reconcile actual contract terms,
  billing frequency, and currency with Propeller.
