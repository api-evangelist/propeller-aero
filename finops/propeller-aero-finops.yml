principles:
- name: Visibility
  description: Track subscribed sites and hardware fleet per contract; there is no per-call API meter to monitor.
- name: Allocation
  description: Allocate per-site subscription and hardware cost to the project/team that owns each job site.
- name: Optimization
  description: Consolidate or retire inactive sites; right-size the AeroPoint fleet per site; automate exports via the Public API to reduce manual reprocessing.
- name: Accountability
  description: Assign each site and its subscription to an owner; review the active-site roster against active projects at renewal.
